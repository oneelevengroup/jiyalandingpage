<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JIYA — Coming Soon</title>
    <meta
      name="description"
      content="JIYA — Jindal Institute for Youthful Aging. A refined new experience is on the way. Facial cosmetic surgery & regenerative care in Raleigh, NC."
    />
    <link rel="icon" type="image/png" href="Icon.png" />

    <!-- Fonts: Forum (display) + Mulish (Avenir-style body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Forum&family=Mulish:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --noir: #14100d;
        --noir-deep: #0a0807;
        --cream: #f2eadd;
        --gold: #d4a853;
        --display: "Forum", Georgia, serif;
        --sans: "Mulish", system-ui, sans-serif;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

      body {
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(120% 90% at 50% 18%, #1b1510 0%, var(--noir) 45%, var(--noir-deep) 100%);
        color: var(--cream);
        font-family: var(--sans);
        text-align: center;
        padding: 40px 24px;
        overflow: hidden;
      }

      .wrap { max-width: 720px; width: 100%; }

      /* Each element fades up in sequence */
      .fade { opacity: 0; transform: translateY(22px); animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
      .d1 { animation-delay: 0.15s; }
      .d2 { animation-delay: 0.35s; }
      .d3 { animation-delay: 0.55s; }
      .d4 { animation-delay: 0.75s; }
      .d5 { animation-delay: 0.95s; }
      @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

      .eyebrow {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.34em;
        color: rgba(242, 234, 221, 0.55);
      }

      /* Brand logo (vertical JIYA lockup) */
      .logo {
        display: block;
        width: auto;
        height: clamp(150px, 34vw, 280px);
        margin: 28px auto 8px;
      }
      .subbrand {
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.36em;
        color: rgba(242, 234, 221, 0.5);
      }

      .headline {
        font-family: var(--display);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: clamp(1.5rem, 4.5vw, 2.6rem);
        color: var(--cream);
        margin-top: 48px;
      }

      .tagline {
        margin-top: 18px;
        font-size: 0.85rem;
        font-weight: 300;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        line-height: 1.9;
        color: rgba(242, 234, 221, 0.75);
      }

      .divider { width: 1px; height: 56px; margin: 40px auto 0; background: rgba(242, 234, 221, 0.25); }

      .contact { margin-top: 36px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
      .contact a {
        color: var(--cream);
        text-decoration: none;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        transition: color 0.4s ease;
      }
      .contact a:hover { color: var(--gold); }
      .contact .addr { font-size: 0.72rem; letter-spacing: 0.12em; color: rgba(242, 234, 221, 0.5); text-transform: uppercase; }

      .cta {
        display: inline-block;
        margin-top: 6px;
        border: 1px solid var(--cream);
        padding: 15px 34px;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: var(--cream);
        text-decoration: none;
        transition: background 0.5s cubic-bezier(0.22,1,0.36,1), color 0.5s cubic-bezier(0.22,1,0.36,1);
      }
      .cta:hover { background: var(--cream); color: var(--noir); }

      @media (prefers-reduced-motion: reduce) {
        .fade { animation: none; opacity: 1; transform: none; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="eyebrow fade d1">Jindal Institute for Youthful Aging · Raleigh, NC</p>

      <img
        class="logo fade d2"
        src="Vertical%20JIYA.png"
        alt="JIYA — Jindal Institute for Youthful Aging"
        width="1133"
        height="1294"
      />
      <p class="subbrand fade d2">Facial Cosmetic Surgery</p>

      <h2 class="headline fade d3">A refined new experience is on the way</h2>

      <p class="tagline fade d4">
        Look better. See better. Feel better.<br />
        Luxury facial cosmetic surgery &amp; regenerative care.
      </p>

      <div class="divider fade d4"></div>

      <div class="contact fade d5">
        <a href="tel:+19842753818">(984) 275-3818</a>
        <span class="addr">7901 ACC Blvd, Suite 201 · Raleigh, NC 27617</span>
        <a class="cta" href="tel:+19842753818">Book a Consultation</a>
      </div>
    </main>
  </body>
</html>
